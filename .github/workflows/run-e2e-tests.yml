name: Run E2E Tests

on: [push, pull_request]

jobs:
  run-e2e-tests:
    name: Run E2E Tests
    runs-on: ubuntu-latest

    services:
      find-a-friend:
        image: bitnami/postgresql
        ports:
          - 5432:5432
        env:
          POSTGRESQL_USERNAME: demisrusso
          POSTGRESQL_PASSWORD: 123456
          POSTGRESQL_DATABASE: find-a-friend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - run: npm ci

      - run: npm run test:e2e
        env:
          DATABASE_URL: 'postgresql://demisrusso:123456@localhost:5432/find-a-friend?schema=public'
          JWT_SECRET: test-secret
          NODE_ENV: test
          HOST: localhost
